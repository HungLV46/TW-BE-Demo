version: "3"

services:
  aurad:
    image: auranw/local-aurad:dev_v0.7.0-3
    container_name: "dev-aurad"
    ports:
      - "1317:1317"
      - "26657:26657"
      - "9090:9090"
    networks:
      - dev_network
  # aurad-indexer:
  #   image: auranw/local-aurad:latest-alpine
  #   container_name: "dev-aurad-indexer"
  #   networks:
  #     - dev_network
  #   volumes:
  #     - ${PWD}/docker/aura/config.toml:/root/.aura/config/config.toml
  #     - ${PWD}/docker/aura/node_key.json:/root/.aura/config/node_key.json
  #     - ${PWD}/docker/aura/priv_validator_key.json:/root/.aura/config/priv_validator_key.json
  #   depends_on:
  #     - pgsql
  redis:
    image: redis:6-alpine
    container_name: "dev-redis"
    ports:
      - "6379:6379"
    networks:
      - dev_network
  redisinsight:
    image: redislabs/redisinsight:latest
    container_name: "dev-redisinsight"
    ports:
      - "8001:8001"
    networks:
      - dev_network
    depends_on:
      - redis
  adminer:
    image: adminer:4-standalone
    restart: always
    ports:
      - "8080:8080"
    container_name: "dev-adminer"
    networks:
      - dev_network
  pgsql:
    image: postgres:13-alpine
    container_name: dev-pg
    environment:
      POSTGRES_PASSWORD: password
      POSTGRES_USER: twilight_user
      POSTGRES_DB: twilight_dev
    ports:
      - "5432:5432"
    volumes:
      - ./pgsql_init:/docker-entrypoint-initdb.d
    networks:
      - dev_network
  graphql-engine:
    image: hasura/graphql-engine:v2.12.1
    ports:
      - "8888:8080"
    depends_on:
      - "pgsql"
    restart: always
    environment:
      ## postgres database to store Hasura metadata
      HASURA_GRAPHQL_METADATA_DATABASE_URL: postgres://twilight_user:password@dev-pg:5432/hasura
      HASURA_GRAPHQL_DATABASE_URL: postgres://twilight_user:password@dev-pg:5432/twilight_dev
      # HASURA_GRAPHQL_AUTH_HOOK: https://twilight-api.dev.aura.network/auth-webhook
      ## this env var can be used to add the above postgres database to Hasura as a data source. this can be removed/updated based on your needs
      PG_DATABASE_URL: postgres://twilight_user:password@dev-pg:5432/twilight_dev
      ## enable the console served by server
      HASURA_GRAPHQL_ENABLE_CONSOLE: "true" # set to "false" to disable console
      ## enable debugging mode. It is recommended to disable this in production
      HASURA_GRAPHQL_DEV_MODE: "true"
      HASURA_GRAPHQL_ENABLED_LOG_TYPES: startup, http-log, webhook-log, websocket-log, query-log
      ## uncomment next line to run console offline (i.e load console assets from server instead of CDN)
      # HASURA_GRAPHQL_CONSOLE_ASSETS_DIR: /srv/console-assets
      ## uncomment next line to set an admin secret
      # HASURA_GRAPHQL_ADMIN_SECRET: myadminsecretkey
    networks:
      - dev_network
  ipfs:
    image: ipfs/kubo:master-2022-12-16-430a65a
    container_name: dev-ipfs
    restart: unless-stopped
    ports:
      - "5001:5001"
      - "8088:8080"
      - "4001:4001"
    networks:
      - dev_network

networks:
  dev_network:
    driver: bridge
